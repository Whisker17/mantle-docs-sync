name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false        # docs build doesn't need submodules

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (static export)
        env:
          STATIC_EXPORT: 'true'
        run: npm run build

      - name: Generate redirect pages
        run: node scripts/generate-redirects.mjs

      - name: Verify output
        run: |
          test -d out || { echo "ERROR: out/ directory missing"; exit 1; }
          echo "✓ Static export produced $(find out -name '*.html' | wc -l) HTML files"
